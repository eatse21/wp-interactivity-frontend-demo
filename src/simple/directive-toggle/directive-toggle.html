<!-- Directive Toggle - Floating Action Button -->
<div data-wp-interactive="directiveToggle" class="directive-toggle-fab">
    <button
        class="directive-toggle-btn"
        data-wp-on--click="actions.toggleShowAll"
        title="Toggle all directives"
    >
        <span class="directive-toggle-icon">📋</span>
        <span class="directive-toggle-text" data-wp-text="state.toggleButtonText">View all directives</span>
    </button>
</div>
